# Shell-executor LXD runner (ci/lxd/): xschem/ngspice/python toolchain,
# sky130 PDK at $PDK_ROOT (from /etc/profile.d/pdk.sh).
#
# Assertion policy (DESIGN.md): precision-path SNDR scatters +-1 dB
# run-to-run (chaotic modulator) -- only loose floors, never exact values.

# Lockdown: pipelines run ONLY for direct pushes to branches in THIS
# project (membership required to push). No merge-request pipelines --
# fork MRs must never execute on the private runner VM. Defense in depth
# on top of: project runner not shared with forks, and no
# merge_request_event rules anywhere below.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

# shell executor may not source /etc/profile.d -- set PDK_ROOT explicitly
variables:
  PDK_ROOT: /opt/pdk

stages:
  - smoke
  - reports
  - layout
  - pages

snr:
  stage: smoke
  script:
    - make clean
    - make snr | tee snr.log
    # loose floor only: fast path is stable, 35 dB is far below nominal ~39
    - awk '/fast/ { if ($4 < 35) { print "FAIL fast-path SNDR " $4; exit 1 } }' snr.log
    - python3 tools/gen_doc_figs.py tier1
  artifacts:
    paths: [reports/results/]
    expire_in: 30 days

fet-char:
  stage: smoke
  script:
    - make char
  artifacts:
    paths: [reports/fet_char.html]
    expire_in: 30 days

dac-report:
  stage: reports
  script:
    - make report
  artifacts:
    paths: [reports/dac_compare.html]
    expire_in: 30 days

ota-specs:
  stage: reports
  script:
    - make specs
  artifacts:
    paths: [reports/ota_specs.html]
    expire_in: 30 days

# full layout verification chain (needs source-built magic + netgen on the
# runner -- ci/lxd/cloud-init.yml provisions them):
#   xcheck  = golden netlist generated + schematic equivalence proven
#   ota_tb  = schematic-level metrics (JSON for the docs page)
#   pex     = parasitic extraction + same TB on the extracted netlist
#   layout_report = fresh-process DRC (must be 0) + netgen LVS (must match)
#                   + GDS export + 3D geometry for the pages viewer
layout-verify:
  stage: layout
  script:
    - make xcheck
    - python3 sim/ota_tb.py
    - python3 tools/pex_ota.py
    - python3 sim/ota_tb.py --pex
    - python3 tools/layout_report.py
    - python3 tools/gen_doc_figs.py ota
  artifacts:
    paths:
      - reports/results/
      - reports/ota_layout.gds
    expire_in: 30 days

# comparator + retimer verification (quick grid; the corner sweep and the
# offset Monte Carlo are dev-bench runs -- their page rows only appear on
# builds that ran them)
comparator:
  stage: layout
  script:
    - python3 sim/comp_tb.py --quick
    - make compcheck
    - python3 sim/dff_tb.py
    - python3 tools/gen_doc_figs.py comp
  artifacts:
    paths: [reports/results/]
    expire_in: 30 days

# bias generator + reference buffers + clock level shifter (each exits
# nonzero if its acceptance gate fails)
support-blocks:
  stage: layout
  script:
    - make xcheck
    - python3 sim/bias_tb.py
    - python3 sim/buf_tb.py
    - python3 sim/lvl_tb.py
    - python3 sim/odrv_tb.py
  artifacts:
    paths: [reports/results/]
    expire_in: 30 days

# GitLab Pages: the generated design document, with every number sourced
# from THIS pipeline's artifacts (tools/gen_docs.py marks anything missing
# as "not verified in this build")
pages:
  stage: pages
  needs:
    - job: snr
      artifacts: true
    - job: fet-char
      artifacts: true
    - job: dac-report
      artifacts: true
    - job: ota-specs
      artifacts: true
    - job: layout-verify
      artifacts: true
    - job: comparator
      artifacts: true
    - job: support-blocks
      artifacts: true
  script:
    - python3 tools/gen_docs.py
  artifacts:
    paths: [public]
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
